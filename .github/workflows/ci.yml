name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # IMPORTANT NOTE: windows-latest pulled — CI hangs indefinitely on
        # windows (90+ min, not a slow build) as of 2026-07-02, root cause
        # not yet found (stdin reads and daemon spawn ruled out). Re-add once
        # fixed; release.yml's windows-msvc build is paused for the same
        # reason.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
